name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          SC2044: true
          SC2086: true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./action
          load: true
          tags: multi-linter:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Python linter
        run: |
          docker run --rm -v $(pwd)/tests/fixtures:/app multi-linter:test \
            /bin/bash -c "cd /app/python && flake8 bad.py"

      - name: Test JavaScript linter
        run: |
          docker run --rm -v $(pwd)/tests/fixtures:/app multi-linter:test \
            /bin/bash -c "cd /app/javascript && eslint bad.js" || true

      - name: Test YAML linter
        run: |
          docker run --rm -v $(pwd)/tests/fixtures:/app multi-linter:test \
            /bin/bash -c "cd /app/yaml && yamllint bad.yml"

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy on Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scan-ref: 'multi-linter:test'
          format: 'sarif'
          output: 'trivy-image-results.sarif'

      - name: Upload Trivy image results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image-results.sarif'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Multi-Linter
        uses: ./
        with:
          config_file: config/linter-config.yaml

  self-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Multi-Linter (self-check)
        uses: ./
        with:
          config_file: config/linter-config-self.yaml

  verify-linters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count linter scripts
        run: |
          COUNT=$(ls -1 linters/*.sh | wc -l)
          echo "Linter scripts: $COUNT"
          if [ "$COUNT" -lt 40 ]; then
            echo "Expected 40+ linter scripts, found $COUNT"
            exit 1
          fi

      - name: Verify all linters in config exist
        run: |
          for linter in $(yq e '.linters | keys[]' config/linter-config.yaml); do
            if [ ! -f "linters/${linter}.sh" ]; then
              echo "Missing linter script: ${linter}.sh"
              exit 1
            fi
          done
          echo "All linters verified"

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run integration tests
        run: |
          bash tests/integration/run-tests.sh

      - name: Run linter script unit tests
        run: |
          bash tests/integration/test-scripts.sh
